name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # ۱. گرفتن کد
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ۲. نصب .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ۳. Restore
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ۴. Publish — دقیقاً همون build.ps1 -Publish
      - name: Publish (single-file, self-contained)
        run: |
          dotnet publish PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --no-restore

      # ۵. بررسی فایل خروجی
      - name: Verify output
        shell: pwsh
        run: |
          $exe = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\PsiphonUI.exe"
          if (-not (Test-Path $exe)) { Write-Error "Not found: $exe"; exit 1 }
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "OK: PsiphonUI.exe — $mb MB" -ForegroundColor Green

      # ۶. همیشه Artifact آپلود می‌شه (هم tag، هم workflow_dispatch)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PsiphonUI-win-x64
          path: PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\PsiphonUI.exe
          if-no-files-found: error

      # ۷. GitHub Release فقط روی tag ساخته می‌شه
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\PsiphonUI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
