name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── ۱. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── ۲. .NET 8 SDK ─────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── ۳. دانلود psiphon3.exe و استخراج psiphon.config با روش مستقیم ───
      #
      # psiphon3.exe یک single-exe هست که psiphon-tunnel-core.exe رو به عنوان
      # resource داخل خودش embed کرده و هنگام اجرا extract می‌کنه.
      # config رو قبل از اینکه GUI load بشه می‌نویسه.
      # GitHub Actions روی Windows Server هست و می‌تونه GUI app اجرا کنه.
      # مشکل قبلی این بود که %APPDATA% رو اشتباه چک می‌کردیم.
      # ──────────────────────────────────────────────────────────────────────
      - name: Download psiphon3.exe and extract config
        shell: pwsh
        run: |
          # دانلود
          Write-Host "Downloading psiphon3.exe ..."
          Invoke-WebRequest -Uri "https://psiphon.ca/psiphon3.exe" `
                            -OutFile "psiphon3.exe" `
                            -UseBasicParsing
          Write-Host "Downloaded: $([math]::Round((Get-Item psiphon3.exe).Length/1MB,1)) MB"

          # اجرا با timeout — psiphon.config رو می‌نویسه قبل از GUI
          $proc = Start-Process ".\psiphon3.exe" -PassThru -WindowStyle Hidden

          # همه مسیرهای ممکن که psiphon config ممکنه نوشته بشه
          $possiblePaths = @(
              "$env:APPDATA\Psiphon3\psiphon.config",
              "$env:LOCALAPPDATA\Psiphon3\psiphon.config",
              "$env:APPDATA\Psiphon\psiphon.config",
              "$env:LOCALAPPDATA\Psiphon\psiphon.config"
          )

          $configPath = $null
          for ($i = 0; $i -lt 45; $i++) {
              Start-Sleep -Seconds 1
              foreach ($p in $possiblePaths) {
                  if (Test-Path $p) { $configPath = $p; break }
              }
              if ($configPath) { break }
              if ($i % 5 -eq 0) { Write-Host "  Waiting... ($i s)" }
          }

          # متوقف کردن psiphon و tunnel-core
          try { $proc | Stop-Process -Force -ErrorAction SilentlyContinue } catch {}
          Get-Process -Name "psiphon*","psiphon-tunnel-core" -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue

          if (-not $configPath) {
              # debug: نشون بده چی تو AppData هست
              Write-Host "`nAppData contents:"
              Get-ChildItem "$env:APPDATA" -ErrorAction SilentlyContinue | Select-Object Name
              Get-ChildItem "$env:LOCALAPPDATA" -ErrorAction SilentlyContinue | Select-Object Name
              Write-Host "`nTemp contents (psiphon files):"
              Get-ChildItem $env:TEMP -Filter "*psiphon*" -Recurse -ErrorAction SilentlyContinue |
                  Select-Object FullName

              Write-Error "psiphon.config not found in any expected location after 45 seconds"
              exit 1
          }

          Write-Host "Config found: $configPath"
          $json = Get-Content $configPath -Raw | ConvertFrom-Json

          # ── استخراج و ذخیره در GITHUB_ENV ──
          function Set-GHEnv($name, $value) {
              if ($value) {
                  $d = "EOF_" + ([guid]::NewGuid().ToString("N").Substring(0,8))
                  Add-Content $env:GITHUB_ENV "$name<<$d"
                  Add-Content $env:GITHUB_ENV "$value"
                  Add-Content $env:GITHUB_ENV "$d"
              }
          }

          Set-GHEnv "PSI_PROPAGATION_CHANNEL_ID" $json.PropagationChannelId
          Set-GHEnv "PSI_SPONSOR_ID"             $json.SponsorId
          Set-GHEnv "PSI_RSL_SIG_KEY"   $json.RemoteServerListSignaturePublicKey
          Set-GHEnv "PSI_SE_SIG_KEY"    $json.ServerEntrySignaturePublicKey
          Set-GHEnv "PSI_FB_ENC_KEY"    $json.FeedbackEncryptionPublicKey
          Set-GHEnv "PSI_UPG_SIG_KEY"   $json.UpgradeSignaturePublicKey

          Write-Host "`n=== Extracted ==="
          Write-Host "  PropagationChannelId = $($json.PropagationChannelId)"
          Write-Host "  SponsorId            = $($json.SponsorId)"
          Write-Host "  RSL sig key len      = $($json.RemoteServerListSignaturePublicKey.Length)"

      # ── ۴. تزریق به EmbeddedValues.cs ────────────────────────────────────
      - name: Inject EmbeddedValues
        shell: pwsh
        run: |
          $file = "PsiphonUI\Services\EmbeddedValues.cs"
          if (-not (Test-Path $file)) { Write-Error "EmbeddedValues.cs not found"; exit 1 }

          $c = Get-Content $file -Raw

          function Patch($text, $old, $new, $label) {
              if (-not $new) { Write-Warning "SKIP (empty): $label"; return $text }
              $r = $text -replace ([regex]::Escape($old)), ($new -replace '\\','\\\\')
              if ($r -eq $text) { Write-Warning "NOT FOUND: $label placeholder '$old'" }
              else { Write-Host "  OK: $label" }
              return $r
          }

          Write-Host "Patching EmbeddedValues.cs..."
          $c = Patch $c "PROPAGATION_CHANNEL_ID" $env:PSI_PROPAGATION_CHANNEL_ID "PropagationChannelId"
          $c = Patch $c "SPONSOR_ID"             $env:PSI_SPONSOR_ID             "SponsorId"
          $c = Patch $c "REMOTE_SERVER_LIST_SIGNATURE_PUBLIC_KEY" $env:PSI_RSL_SIG_KEY  "RemoteServerListSigKey"
          $c = Patch $c "SERVER_ENTRY_SIGNATURE_PUBLIC_KEY"       $env:PSI_SE_SIG_KEY   "ServerEntrySigKey"
          $c = Patch $c "FEEDBACK_ENCRYPTION_PUBLIC_KEY"          $env:PSI_FB_ENC_KEY   "FeedbackEncKey"
          $c = Patch $c "UPGRADE_SIGNATURE_PUBLIC_KEY"            $env:PSI_UPG_SIG_KEY  "UpgradeSigKey"

          Set-Content $file $c -NoNewline
          Write-Host "Done."

      # ── ۵. Restore ────────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ── ۶. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: |
          dotnet build PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore

      # ── ۷. Stage: exe + dll ها + Resources ───────────────────────────────
      - name: Prepare release folder
        shell: pwsh
        run: |
          $out   = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64"
          $stage = "stage\Se7enPro"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Get-ChildItem $out -File | Copy-Item -Destination $stage
          if (Test-Path "PsiphonUI\Resources") {
              Copy-Item "PsiphonUI\Resources" "$stage\Resources" -Recurse -Force
              Write-Host "Resources copied"
          }

      # ── ۸. Zip ────────────────────────────────────────────────────────────
      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive "stage\Se7enPro" "Se7enPro-win-x64.zip" -Force
          Write-Host "Zip: $([math]::Round((Get-Item Se7enPro-win-x64.zip).Length/1MB,1)) MB"

      # ── ۹. Artifact ───────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Se7enPro-win-x64
          path: stage\Se7enPro\
          if-no-files-found: error

      # ── ۱۰. Release روی tag ───────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Se7enPro-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
