name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── ۱. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── ۲. .NET 8 SDK ─────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── ۳. دانلود psiphon3.exe و اجرای کوتاه برای generate کردن psiphon.config
      #
      # psiphon3.exe هنگام اجرا فایل psiphon.config رو در
      # %AppData%\Psiphon3\psiphon.config می‌نویسه.
      # این config فایل JSON هست که شامل PropagationChannelId، SponsorId
      # و تمام کلیدهای public key هست — دقیقاً همان چیزی که نیاز داریم.
      # ──────────────────────────────────────────────────────────────────────
      - name: Extract config from official Psiphon client
        shell: pwsh
        run: |
          # دانلود
          Write-Host "Downloading psiphon3.exe ..."
          Invoke-WebRequest -Uri "https://psiphon.ca/psiphon3.exe" `
                            -OutFile "psiphon3.exe" `
                            -UseBasicParsing
          $mb = [math]::Round((Get-Item "psiphon3.exe").Length / 1MB, 1)
          Write-Host "Downloaded: $mb MB"

          # اجرای psiphon3.exe برای چند ثانیه تا config رو بنویسه
          Write-Host "Launching psiphon3.exe to generate config..."
          $proc = Start-Process -FilePath ".\psiphon3.exe" `
                                -PassThru `
                                -WindowStyle Hidden
          
          # صبر می‌کنیم تا config.json نوشته بشه (max 30 ثانیه)
          $configPath = "$env:APPDATA\Psiphon3\psiphon.config"
          $waited = 0
          while (-not (Test-Path $configPath) -and $waited -lt 30) {
              Start-Sleep -Seconds 1
              $waited++
              Write-Host "  Waiting for config... ($waited s)"
          }

          # متوقف کردن psiphon3
          try { $proc | Stop-Process -Force } catch {}
          # متوقف کردن هر psiphon-tunnel-core احتمالی
          Get-Process -Name "psiphon-tunnel-core" -ErrorAction SilentlyContinue | Stop-Process -Force

          if (-not (Test-Path $configPath)) {
              Write-Error "psiphon.config was not created after 30 seconds!"
              exit 1
          }

          Write-Host "Config found at: $configPath"
          $configSize = (Get-Item $configPath).Length
          Write-Host "Config size: $configSize bytes"

          # خواندن JSON
          $json = Get-Content $configPath -Raw | ConvertFrom-Json

          # استخراج فیلدهای مورد نیاز
          $propChannelId = $json.PropagationChannelId
          $sponsorId     = $json.SponsorId

          Write-Host "`n=== Extracted Values ==="
          Write-Host "  PropagationChannelId = $propChannelId"
          Write-Host "  SponsorId            = $sponsorId"

          if (-not $propChannelId -or -not $sponsorId) {
              Write-Host "`nConfig JSON keys available:"
              $json.PSObject.Properties.Name | ForEach-Object { Write-Host "  $_" }
              Write-Error "Failed to extract PropagationChannelId or SponsorId"
              exit 1
          }

          # ذخیره در GITHUB_ENV برای step های بعدی
          function Set-Env($name, $value) {
              if ($value) {
                  # اگه مقدار multi-line بود (مثل کلیدهای public key) از EOF delimiter استفاده کن
                  $delim = "EOF_" + [System.Guid]::NewGuid().ToString("N").Substring(0,8)
                  Add-Content -Path $env:GITHUB_ENV -Value "$name<<$delim"
                  Add-Content -Path $env:GITHUB_ENV -Value $value
                  Add-Content -Path $env:GITHUB_ENV -Value $delim
              }
          }

          Set-Env "PSI_PROPAGATION_CHANNEL_ID" $propChannelId
          Set-Env "PSI_SPONSOR_ID"             $sponsorId

          # کلیدهای public key — اگه وجود داشتن
          $keys = @(
              @{ env="PSI_REMOTE_SERVER_LIST_SIG_KEY";  prop="RemoteServerListSignaturePublicKey" },
              @{ env="PSI_SERVER_ENTRY_SIG_KEY";        prop="ServerEntrySignaturePublicKey" },
              @{ env="PSI_FEEDBACK_ENC_KEY";            prop="FeedbackEncryptionPublicKey" },
              @{ env="PSI_UPGRADE_SIG_KEY";             prop="UpgradeSignaturePublicKey" },
              @{ env="PSI_REMOTE_SERVER_LIST_URLS";     prop="RemoteServerListURLs" },
              @{ env="PSI_OSL_ROOT_URLS";               prop="ObfuscatedServerListRootURLs" },
              @{ env="PSI_UPGRADE_URLS";                prop="UpgradeDownloadURLs" }
          )
          foreach ($k in $keys) {
              $val = $json.($k.prop)
              if ($val) {
                  if ($val -is [Array] -or $val -is [System.Management.Automation.PSCustomObject]) {
                      $val = $val | ConvertTo-Json -Compress -Depth 10
                  }
                  Set-Env $k.env $val
                  Write-Host "  $($k.env) extracted (len=$($val.Length))"
              }
          }

          Write-Host "`nExtraction complete!"

      # ── ۴. تزریق مقادیر به EmbeddedValues.cs ────────────────────────────
      - name: Inject values into EmbeddedValues.cs
        shell: pwsh
        run: |
          $file = "PsiphonUI\Services\EmbeddedValues.cs"
          if (-not (Test-Path $file)) { Write-Error "EmbeddedValues.cs not found!"; exit 1 }

          $content = Get-Content $file -Raw

          function Replace-If-Set($text, $placeholder, $value, $label) {
              if ($value) {
                  $escaped = [regex]::Escape($placeholder)
                  $new = $text -replace $escaped, ($value -replace '\\', '\\')
                  if ($new -ne $text) { Write-Host "  OK: $label" }
                  else { Write-Warning "  SKIP: '$placeholder' not found for $label" }
                  return $new
              }
              Write-Warning "  EMPTY: $label"
              return $text
          }

          Write-Host "=== Injecting EmbeddedValues ==="
          $content = Replace-If-Set $content "PROPAGATION_CHANNEL_ID" $env:PSI_PROPAGATION_CHANNEL_ID "PropagationChannelId"
          $content = Replace-If-Set $content "SPONSOR_ID"             $env:PSI_SPONSOR_ID             "SponsorId"
          $content = Replace-If-Set $content "REMOTE_SERVER_LIST_SIGNATURE_PUBLIC_KEY" $env:PSI_REMOTE_SERVER_LIST_SIG_KEY  "RemoteServerListSignaturePublicKey"
          $content = Replace-If-Set $content "SERVER_ENTRY_SIGNATURE_PUBLIC_KEY"       $env:PSI_SERVER_ENTRY_SIG_KEY        "ServerEntrySignaturePublicKey"
          $content = Replace-If-Set $content "FEEDBACK_ENCRYPTION_PUBLIC_KEY"          $env:PSI_FEEDBACK_ENC_KEY            "FeedbackEncryptionPublicKey"
          $content = Replace-If-Set $content "UPGRADE_SIGNATURE_PUBLIC_KEY"            $env:PSI_UPGRADE_SIG_KEY             "UpgradeSignaturePublicKey"

          Set-Content $file $content -NoNewline
          Write-Host "EmbeddedValues.cs updated."

          # بررسی اینکه placeholder های اصلی جایگزین شدن
          $remaining = Select-String -Path $file -Pattern '"PROPAGATION_CHANNEL_ID"|"SPONSOR_ID"'
          if ($remaining) { Write-Warning "Some placeholders may still remain!" }
          else { Write-Host "Verification OK: no raw placeholders remain." }

      # ── ۵. Restore ────────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ── ۶. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: |
          dotnet build PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore

      # ── ۷. آماده‌سازی پوشه خروجی + کپی Resources ──────────────────────────
      - name: Prepare release folder
        shell: pwsh
        run: |
          $buildOut = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64"
          $stage    = "stage\Se7enPro"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Get-ChildItem -Path $buildOut -File | Copy-Item -Destination $stage
          $res = "PsiphonUI\Resources"
          if (Test-Path $res) {
              Copy-Item -Path $res -Destination "$stage\Resources" -Recurse -Force
              Write-Host "Resources copied OK"
          } else {
              Write-Warning "Resources folder not found!"
          }
          Write-Host "=== Output files ==="
          Get-ChildItem -Path $stage -Recurse | Select-Object FullName

      # ── ۸. Zip ────────────────────────────────────────────────────────────
      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive -Path "stage\Se7enPro" -DestinationPath "Se7enPro-win-x64.zip" -Force
          $mb = [math]::Round((Get-Item "Se7enPro-win-x64.zip").Length / 1MB, 1)
          Write-Host "Zip: $mb MB"

      # ── ۹. Upload Artifact ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Se7enPro-win-x64
          path: stage\Se7enPro\
          if-no-files-found: error

      # ── ۱۰. GitHub Release (فقط روی tag) ──────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Se7enPro-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
