name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── ۱. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── ۲. .NET 8 SDK ─────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── ۳. Python (برای parse کردن exe رسمی) ──────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── ۴. دانلود psiphon3.exe رسمی و استخراج مقادیر ──────────────────────
      #
      # روش کار:
      #   psiphon3.exe یک PE32 executable هست که tunnel-core-config.json
      #   رو به صورت یک null-terminated ASCII string داخل خودش embed کرده.
      #   این JSON شامل PropagationChannelId، SponsorId و بقیه کلیدها هست.
      #   کافیه باینری رو به صورت رشته‌های ASCII بخونیم و JSON رو پیدا کنیم.
      #
      - name: Extract EmbeddedValues from official Psiphon client
        shell: python
        run: |
          import urllib.request
          import re
          import json
          import os
          import sys

          print("Downloading official psiphon3.exe ...")
          url = "https://psiphon.ca/psiphon3.exe"
          exe_path = "psiphon3.exe"
          urllib.request.urlretrieve(url, exe_path)
          size_mb = os.path.getsize(exe_path) / (1024*1024)
          print(f"Downloaded: {size_mb:.1f} MB")

          # خوندن باینری و استخراج رشته‌های ASCII قابل print
          with open(exe_path, "rb") as f:
              raw = f.read()

          # پیدا کردن تمام رشته‌های printable با طول حداقل 8 کاراکتر
          strings = re.findall(rb'[ -~]{8,}', raw)
          text_blob = b"\n".join(strings).decode("ascii", errors="ignore")

          # ── پیدا کردن PropagationChannelId (رشته HEX 16 کاراکتری) ──
          # در embeddedvalues.h این مقادیر دقیقاً 16 کاراکتر uppercase hex هستن
          # ولی برای اطمینان هم uppercase هم lowercase رو چک می‌کنیم
          hex16 = re.findall(r'\b([0-9A-Fa-f]{16})\b', text_blob)
          hex16_unique = list(dict.fromkeys(hex16))  # حفظ ترتیب، حذف تکراری
          print(f"\nHEX-16 candidates found: {hex16_unique[:10]}")

          # ── پیدا کردن JSON config که tunnel-core داخل exe embed شده ──
          # tunnel-core config به صورت JSON با کلیدهای مشخص embed میشه
          json_pattern = re.findall(
              r'\{[^{}]*"PropagationChannelId"\s*:\s*"([^"]+)"[^{}]*"SponsorId"\s*:\s*"([^"]+)"[^{}]*\}',
              text_blob
          )

          # اگه JSON مستقیم پیدا نشد، بصورت جداگانه دنبال فیلدها بگرد
          prop_channel_id = ""
          sponsor_id = ""

          if json_pattern:
              prop_channel_id = json_pattern[0][0]
              sponsor_id = json_pattern[0][1]
              print(f"\nFound via JSON pattern:")
              print(f"  PropagationChannelId = {prop_channel_id}")
              print(f"  SponsorId            = {sponsor_id}")
          else:
              # روش دوم: پیدا کردن مستقیم با regex در کل blob
              m = re.search(r'PropagationChannelId["\s:]+([0-9A-Fa-f]{16})', text_blob)
              if m:
                  prop_channel_id = m.group(1)
              m2 = re.search(r'SponsorId["\s:]+([0-9A-Fa-f]{16})', text_blob)
              if m2:
                  sponsor_id = m2.group(1)
              print(f"\nFound via regex search:")
              print(f"  PropagationChannelId = {prop_channel_id}")
              print(f"  SponsorId            = {sponsor_id}")

          # ── استخراج کلیدهای public key (base64، معمولاً 44+ کاراکتر) ──
          # RemoteServerListSignaturePublicKey و ServerEntrySignaturePublicKey
          # ed25519 public keys هستن که به صورت base64 ذخیره میشن
          b64_keys = re.findall(
              r'[A-Za-z0-9+/]{43,}={0,2}',
              text_blob
          )
          b64_unique = list(dict.fromkeys(b64_keys))
          print(f"\nBase64 key candidates (first 5): {b64_unique[:5]}")

          # ── جستجوی مستقیم‌تر برای کلیدها با context ──
          remote_server_list_sig_key = ""
          server_entry_sig_key = ""
          feedback_enc_key = ""
          upgrade_sig_key = ""

          # پیدا کردن RemoteServerListSignaturePublicKey
          m = re.search(r'REMOTE_SERVER_LIST_SIGNATURE_PUBLIC_KEY[^"]*"([A-Za-z0-9+/=]{44,})"', text_blob)
          if m:
              remote_server_list_sig_key = m.group(1)
          m = re.search(r'SERVER_ENTRY_SIGNATURE_PUBLIC_KEY[^"]*"([A-Za-z0-9+/=]{44,})"', text_blob)
          if m:
              server_entry_sig_key = m.group(1)
          m = re.search(r'FEEDBACK_ENCRYPTION_PUBLIC_KEY[^"]*"([A-Za-z0-9+/=]{44,})"', text_blob)
          if m:
              feedback_enc_key = m.group(1)
          m = re.search(r'UPGRADE_SIGNATURE_PUBLIC_KEY[^"]*"([A-Za-z0-9+/=]{44,})"', text_blob)
          if m:
              upgrade_sig_key = m.group(1)

          # ── ذخیره نتایج به عنوان environment variable برای step های بعدی ──
          env_file = os.environ.get("GITHUB_ENV", "")
          if not env_file:
              print("WARNING: GITHUB_ENV not set, running locally?")
              env_file = "local_env.txt"

          # اگه مقادیر پیدا نشدن، از hex16 candidates استفاده کن
          if not prop_channel_id and len(hex16_unique) >= 1:
              prop_channel_id = hex16_unique[0]
              print(f"Fallback PropagationChannelId from hex16[0]: {prop_channel_id}")
          if not sponsor_id and len(hex16_unique) >= 2:
              sponsor_id = hex16_unique[1]
              print(f"Fallback SponsorId from hex16[1]: {sponsor_id}")

          with open(env_file, "a") as f:
              f.write(f"PSI_PROPAGATION_CHANNEL_ID={prop_channel_id}\n")
              f.write(f"PSI_SPONSOR_ID={sponsor_id}\n")
              f.write(f"PSI_REMOTE_SERVER_LIST_SIG_KEY={remote_server_list_sig_key}\n")
              f.write(f"PSI_SERVER_ENTRY_SIG_KEY={server_entry_sig_key}\n")
              f.write(f"PSI_FEEDBACK_ENC_KEY={feedback_enc_key}\n")
              f.write(f"PSI_UPGRADE_SIG_KEY={upgrade_sig_key}\n")

          print("\n=== Values written to GITHUB_ENV ===")
          print(f"  PSI_PROPAGATION_CHANNEL_ID = {prop_channel_id}")
          print(f"  PSI_SPONSOR_ID             = {sponsor_id}")
          print(f"  PSI_REMOTE_SERVER_LIST_SIG_KEY (len={len(remote_server_list_sig_key)})")
          print(f"  PSI_SERVER_ENTRY_SIG_KEY   (len={len(server_entry_sig_key)})")

          # اگه PropagationChannelId یا SponsorId خالی بود، fail کن
          if not prop_channel_id or not sponsor_id:
              print("\nERROR: Could not extract PropagationChannelId or SponsorId!")
              print("Dumping all HEX-16 candidates for diagnosis:")
              for i, h in enumerate(hex16_unique[:20]):
                  print(f"  [{i}] {h}")
              sys.exit(1)

          print("\nExtraction successful!")

      # ── ۵. تزریق مقادیر استخراج‌شده به EmbeddedValues.cs ─────────────────
      - name: Inject values into EmbeddedValues.cs
        shell: pwsh
        run: |
          $file = "PsiphonUI\Services\EmbeddedValues.cs"

          if (-not (Test-Path $file)) {
              Write-Error "EmbeddedValues.cs not found at: $file"
              exit 1
          }

          $content = Get-Content $file -Raw

          # تابع کمکی برای replace کردن ایمن
          function Replace-Value {
              param($text, $placeholder, $value, $label)
              if ($value -and $value -ne "") {
                  $escaped = [regex]::Escape($placeholder)
                  $result = $text -replace $escaped, $value
                  if ($result -ne $text) {
                      Write-Host "  OK: $label = $value"
                  } else {
                      Write-Warning "  SKIP: placeholder '$placeholder' not found for $label"
                  }
                  return $result
              } else {
                  Write-Warning "  EMPTY: $label value is empty, skipping"
                  return $text
              }
          }

          Write-Host "`n=== Injecting EmbeddedValues ==="
          $content = Replace-Value $content "PROPAGATION_CHANNEL_ID" $env:PSI_PROPAGATION_CHANNEL_ID "PropagationChannelId"
          $content = Replace-Value $content "SPONSOR_ID"             $env:PSI_SPONSOR_ID             "SponsorId"

          if ($env:PSI_REMOTE_SERVER_LIST_SIG_KEY -ne "") {
              $content = Replace-Value $content "REMOTE_SERVER_LIST_SIGNATURE_PUBLIC_KEY" $env:PSI_REMOTE_SERVER_LIST_SIG_KEY "RemoteServerListSignaturePublicKey"
          }
          if ($env:PSI_SERVER_ENTRY_SIG_KEY -ne "") {
              $content = Replace-Value $content "SERVER_ENTRY_SIGNATURE_PUBLIC_KEY" $env:PSI_SERVER_ENTRY_SIG_KEY "ServerEntrySignaturePublicKey"
          }
          if ($env:PSI_FEEDBACK_ENC_KEY -ne "") {
              $content = Replace-Value $content "FEEDBACK_ENCRYPTION_PUBLIC_KEY" $env:PSI_FEEDBACK_ENC_KEY "FeedbackEncryptionPublicKey"
          }
          if ($env:PSI_UPGRADE_SIG_KEY -ne "") {
              $content = Replace-Value $content "UPGRADE_SIGNATURE_PUBLIC_KEY" $env:PSI_UPGRADE_SIG_KEY "UpgradeSignaturePublicKey"
          }

          Set-Content $file $content -NoNewline
          Write-Host "`nEmbeddedValues.cs updated successfully."

          # نمایش خطوط کلیدی برای تأیید (بدون نشون دادن مقادیر حساس در log)
          Write-Host "`n=== Verifying placeholders replaced ==="
          $remaining = Select-String -Path $file -Pattern '"PROPAGATION_CHANNEL_ID"|"SPONSOR_ID"'
          if ($remaining) {
              Write-Warning "Some placeholders may still remain!"
          } else {
              Write-Host "No placeholder strings detected."
          }

      # ── ۶. Restore NuGet ──────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ── ۷. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: |
          dotnet build PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore

      # ── ۸. آماده‌سازی پوشه خروجی + کپی Resources ──────────────────────────
      - name: Prepare release folder
        shell: pwsh
        run: |
          $buildOut = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64"
          $stage    = "stage\Se7enPro"

          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # کپی exe + تمام dll ها
          Get-ChildItem -Path $buildOut -File | Copy-Item -Destination $stage

          # کپی پوشه Resources کنار exe
          $res = "PsiphonUI\Resources"
          if (Test-Path $res) {
              Copy-Item -Path $res -Destination "$stage\Resources" -Recurse -Force
              Write-Host "Resources copied OK"
          } else {
              Write-Warning "Resources folder not found!"
          }

          Write-Host "`n=== Output structure ==="
          Get-ChildItem -Path $stage -Recurse | Select-Object FullName

      # ── ۹. Zip ────────────────────────────────────────────────────────────
      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path "stage\Se7enPro" -DestinationPath "Se7enPro-win-x64.zip" -Force
          $mb = [math]::Round((Get-Item "Se7enPro-win-x64.zip").Length / 1MB, 1)
          Write-Host "Zip: $mb MB"

      # ── ۱۰. Upload Artifact (همیشه) ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Se7enPro-win-x64
          path: stage\Se7enPro\
          if-no-files-found: error

      # ── ۱۱. GitHub Release (فقط روی tag) ──────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Se7enPro-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
