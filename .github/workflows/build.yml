name: Build & Release

on:
  # با هر push به master بیلد می‌شه
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── ۱. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── ۲. .NET 8 SDK ─────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── ۳. Restore ────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ── ۴. تزریق مقادیر واقعی Psiphon از GitHub Secrets ─────────
      #   بدون این، tunnel-core با placeholder ها exit code 1 می‌ده
      #   مقادیر رو در: Settings → Secrets and variables → Actions بذار
      - name: Inject EmbeddedValues
        shell: pwsh
        env:
          PROPAGATION_CHANNEL_ID: ${{ secrets.PROPAGATION_CHANNEL_ID }}
          SPONSOR_ID: ${{ secrets.SPONSOR_ID }}
        run: |
          $file = "PsiphonUI\Services\EmbeddedValues.cs"
          (Get-Content $file) `
            -replace '"PROPAGATION_CHANNEL_ID"', "`"$env:PROPAGATION_CHANNEL_ID`"" `
            -replace '"SPONSOR_ID"',             "`"$env:SPONSOR_ID`"" |
          Set-Content $file
          Write-Host "EmbeddedValues injected OK"

      # ── ۵. Build (framework-dependent, dll های جداگانه) ───────
      #   این همون خروجی release اصلی هست:
      #   bin\Release\net8.0-windows10.0.19041.0\win-x64\
      #     PsiphonUI.exe  + کنارش تمام dll ها
      - name: Build
        run: |
          dotnet build PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            --no-restore

      # ── ۵. آماده‌سازی پوشه خروجی نهایی ───────────────────────
      #   ساختار: Se7enPro\
      #              PsiphonUI.exe
      #              *.dll
      #              Resources\   ← کپی از سورس
      - name: Prepare release folder
        shell: pwsh
        run: |
          $buildOut  = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64"
          $stageDir  = "stage\Se7enPro"

          # ساختن پوشه stage
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          # کپی تمام فایل‌های بیلد (exe + dll ها) — بدون زیرپوشه
          Get-ChildItem -Path $buildOut -File | Copy-Item -Destination $stageDir

          # کپی پوشه Resources کنار exe (همانطور که برنامه انتظار داره)
          $resourcesSrc = "PsiphonUI\Resources"
          if (Test-Path $resourcesSrc) {
              Copy-Item -Path $resourcesSrc -Destination "$stageDir\Resources" -Recurse -Force
              Write-Host "Resources copied OK"
          } else {
              Write-Warning "Resources folder not found at $resourcesSrc"
          }

          # نمایش محتوای نهایی
          Write-Host "`n=== Stage contents ==="
          Get-ChildItem -Path $stageDir -Recurse | Select-Object FullName

      # ── ۶. zip کردن برای آپلود ────────────────────────────────
      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path "stage\Se7enPro" -DestinationPath "Se7enPro-win-x64.zip" -Force
          $mb = [math]::Round((Get-Item "Se7enPro-win-x64.zip").Length / 1MB, 1)
          Write-Host "Zip size: $mb MB"

      # ── ۷. Artifact (همیشه آپلود می‌شه — هم push، هم tag) ─────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Se7enPro-win-x64
          path: stage\Se7enPro\
          if-no-files-found: error

      # ── ۸. GitHub Release (فقط روی tag مثل v1.0.1) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Se7enPro-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
