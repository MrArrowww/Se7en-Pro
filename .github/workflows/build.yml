name: Release

# ─────────────────────────────────────────────────────────────
# اجرا می‌شه فقط وقتی یه تگ با فرمت v* پوش بشه (مثل v1.0.0)
# ─────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'

  # اجرای دستی هم ممکنه (برای تست)
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest   # WPF نیاز به Windows داره

    steps:
      # ────────────────────────────────────────────────────────
      # ۱. گرفتن کد
      # ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # تاریخچه کامل برای git describe

      # ────────────────────────────────────────────────────────
      # ۲. نصب .NET 8 SDK (همون چیزی که build.ps1 استفاده می‌کنه)
      # ────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ────────────────────────────────────────────────────────
      # ۳. Restore پکیج‌های NuGet
      # ────────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore PsiphonUI\PsiphonUI.csproj

      # ────────────────────────────────────────────────────────
      # ۴. Publish — دقیقاً همون دستور build.ps1 -Publish
      #    خروجی: یک exe فشرده، self-contained، single-file
      # ────────────────────────────────────────────────────────
      - name: Publish (single-file, self-contained)
        run: |
          dotnet publish PsiphonUI\PsiphonUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --no-restore

      # ────────────────────────────────────────────────────────
      # ۵. بررسی اینکه فایل exe ساخته شده
      # ────────────────────────────────────────────────────────
      - name: Verify output exists
        run: |
          $exe = "PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\PsiphonUI.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build output not found: $exe"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "✓ PsiphonUI.exe found — size: $([math]::Round($size,1)) MB" -ForegroundColor Green
        shell: pwsh

      # ────────────────────────────────────────────────────────
      # ۶. ساختن GitHub Release و آپلود exe
      #    (فقط روی tag اجرا می‌شه)
      # ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Se7enPro ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            PsiphonUI\bin\Release\net8.0-windows10.0.19041.0\win-x64\publish\PsiphonUI.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
